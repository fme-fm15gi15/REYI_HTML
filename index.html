<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日翊小品 Portfolio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-logo">Portfolio</div>
    <ul class="nav-links">
      <li><a href="#hero">首頁</a></li>
      <li><a href="#projects">作品集</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section id="hero" class="hero">
    <div class="hero-content">
      <p class="hero-greeting">Hello, I'm</p>
      <h1 class="hero-name">日翊小品</h1>
      <p class="hero-title">Full Stack Developer</p>
      <p class="hero-desc">熱衷於打造優雅的使用者體驗與高效能的後端系統。</p>
      <div class="hero-buttons">
        <a href="#projects" class="btn btn-primary">查看作品</a>
      </div>
    </div>
    <div class="hero-visual">
      <div class="hero-avatar">REYI</div>
    </div>
  </section>

  <!-- Projects Section -->
  <section id="projects" class="projects">
    <div class="container">
      <div class="section-header">
        <h2>作品集</h2>
        <p>以下作品資料來自 Supabase</p>
      </div>

      <!-- Filter Buttons -->
      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" data-filter="all">全部</button>
      </div>

      <!-- Loading State -->
      <div id="projects-loading" class="loading-state">
        <div class="spinner"></div>
        <p>載入中...</p>
      </div>

      <!-- Error State -->
      <div id="projects-error" class="error-state hidden">
        <p>無法載入作品資料，請稍後再試。</p>
      </div>

      <!-- Projects Grid -->
      <div id="projects-grid" class="projects-grid hidden"></div>

      <!-- Empty State -->
      <div id="projects-empty" class="empty-state hidden">
        <p>目前還沒有作品，請先至 Supabase 新增資料。</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>© 2026 日翊小品 — Built with HTML/CSS/JS + Supabase</p>
  </footer>

  <!-- Supabase JS SDK via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
</body>
</html>
